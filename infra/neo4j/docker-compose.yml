services:
  neo4j:
    image: neo4j:5.20
    container_name: mindlayer-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt (driver)
    environment:
      - NEO4J_AUTH=neo4j/mindlayer123
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1024M
      - NEO4J_db_tx__log_rotation_retention__policy=7 days
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
volumes:
  neo4j_data:
  neo4j_logs:
